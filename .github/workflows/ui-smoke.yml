name: UI Smoke

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GT_BASE_URL: ${{ secrets.GT_BASE_URL }}
      GT_AUTH_EMAIL: ${{ secrets.GT_AUTH_EMAIL }}
      GT_AUTH_PASSWORD: ${{ secrets.GT_AUTH_PASSWORD }}
      GT_BINANCE_API_KEY: ${{ secrets.GT_BINANCE_API_KEY }}
      GT_BINANCE_API_SECRET: ${{ secrets.GT_BINANCE_API_SECRET }}
      GT_TELEGRAM_ENABLED: "true"
      HEADLESS: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browser and system dependencies
        run: |
          python -m playwright install --with-deps chromium

      - name: Run smoke suite
        id: smoke_tests
        continue-on-error: true
        run: |
          python -m pytest -m smoke tests/ui --alluredir=allure-results

      - name: Upload raw Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-smoke
          path: allure-results
          if-no-files-found: warn
          retention-days: 14

      - name: Install Allure CLI
        if: always()
        run: |
          npm install -g allure-commandline

      - name: Build Allure HTML report
        if: always()
        run: |
          if [ -d allure-results ] && [ "$(find allure-results -type f | wc -l)" -gt 0 ]; then
            allure generate allure-results --clean -o allure-report
          else
            mkdir -p allure-report
            echo "No Allure result files were produced."
            printf '%s\n' '<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Allure report unavailable</title></head><body><h1>Allure report unavailable</h1><p>No files were found in <code>allure-results</code>.</p></body></html>' > allure-report/index.html
          fi

      - name: Upload Allure HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-smoke
          path: allure-report
          if-no-files-found: warn
          retention-days: 14

      - name: Upload GitHub Pages artifact
        if: always() && github.event_name != 'pull_request' && github.ref_name == 'main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

      - name: Fail workflow when smoke tests fail
        if: steps.smoke_tests.outcome == 'failure'
        run: exit 1

  deploy-pages:
    if: always() && github.event_name != 'pull_request' && github.ref_name == 'main'
    needs: smoke
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
